name: Feature request
description: Propose a new feature, improvement, or capability.
title: "feat: <short summary>"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the underlying need? What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the feature. UI flow, data model implications, jurisdiction nuances if any.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Scope / priority guess
      options:
        - P0 (blocks v1.0)
        - P1 (next release after v1.0)
        - P2 (nice to have)
        - P3 (aspirational)
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Links to legislation, examples from other tools, screenshots, anything else.
