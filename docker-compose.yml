# Local development stack.
# - `app` runs `pnpm dev` against your working tree (bind-mounted).
# - `postgres`, `minio`, `qdrant` are persistent local services.
#
# Usage:
#   cp .env.example .env       # then edit .env
#   docker compose up -d       # start the data plane
#   pnpm dev                   # OR: docker compose up app
#
# For a fully containerised dev run, use `docker compose --profile app up`.

name: tally-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tally}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tally}
      POSTGRES_DB: ${POSTGRES_DB:-tally}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tally} -d ${POSTGRES_DB:-tally}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tally}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tally-dev-secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # When the app runs inside the compose network, it talks to the
      # other services by their compose service names — not by the
      # localhost URLs in `.env` (which are for `pnpm dev` on the host).
      # To target remote services from the in-compose app, override
      # these at `docker compose up` time or edit this block.
      DATABASE_URL: postgres://${POSTGRES_USER:-tally}:${POSTGRES_PASSWORD:-tally}@postgres:5432/${POSTGRES_DB:-tally}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-tally}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-tally-dev-secret}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # Background-job worker. Same image as `app`, different entrypoint.
  # pg-boss polls Postgres for work — no extra broker needed. Scale
  # independently of the web tier: `docker compose --profile app up --scale worker=3`.
  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["pnpm", "worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tally}:${POSTGRES_PASSWORD:-tally}@postgres:5432/${POSTGRES_DB:-tally}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-tally}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-tally-dev-secret}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
  qdrant-data:
