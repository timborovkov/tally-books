# Local development stack.
# - `app` runs `pnpm dev` against your working tree (bind-mounted).
# - `postgres` (with pgvector) and `rustfs` are persistent local services.
#
# Usage:
#   cp .env.example .env       # then edit .env
#   docker compose up -d       # start the data plane
#   pnpm dev                   # OR: docker compose up app
#
# For a fully containerised dev run, use `docker compose --profile app up`.

name: tally-dev

services:
  postgres:
    # pgvector/pgvector ships Postgres + the `vector` extension preinstalled.
    # The data directory layout matches stock postgres:16, so the existing
    # `postgres-data` volume is reused without migration.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tally}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tally}
      POSTGRES_DB: ${POSTGRES_DB:-tally}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tally} -d ${POSTGRES_DB:-tally}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-tally}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-tally-dev-secret}
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-data:/data
    healthcheck:
      # `nc -z` probes the listening socket without needing bash; the
      # rustfs image is busybox-based and ships nc by default.
      test: ["CMD", "nc", "-z", "127.0.0.1", "9000"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # When the app runs inside the compose network, it talks to the
      # other services by their compose service names — not by the
      # localhost URLs in `.env` (which are for `pnpm dev` on the host).
      # To target remote services from the in-compose app, override
      # these at `docker compose up` time or edit this block.
      DATABASE_URL: postgres://${POSTGRES_USER:-tally}:${POSTGRES_PASSWORD:-tally}@postgres:5432/${POSTGRES_DB:-tally}
      S3_ENDPOINT: http://rustfs:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-tally}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-tally-dev-secret}
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy

  # Background-job worker. Same image as `app`, different entrypoint.
  # pg-boss polls Postgres for work — no extra broker needed. Scale
  # independently of the web tier: `docker compose --profile app up --scale worker=3`.
  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["pnpm", "worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tally}:${POSTGRES_PASSWORD:-tally}@postgres:5432/${POSTGRES_DB:-tally}
      S3_ENDPOINT: http://rustfs:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-tally}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-tally-dev-secret}
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy

volumes:
  postgres-data:
  rustfs-data:
